<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Forge â€” clean F-mark in white on an indigoâ†’violet gradient. Geometry
       chosen to read at 16Ă—16 favicon scale and at 512Ă—512 PWA install icon
       size, and to render cleanly inside the Android maskable safe zone
       (the centre 410Ă—410 region). -->
  <defs>
    <linearGradient id="forgeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- Background tile with brand gradient. -->
  <rect width="512" height="512" rx="112" fill="url(#forgeBg)"/>

  <!-- Subtle inner ring for definition. -->
  <rect x="32" y="32" width="448" height="448" rx="88"
        fill="none" stroke="white" stroke-opacity="0.10" stroke-width="2"/>

  <!-- Stylized 'F' built from three rounded bars (stem + top arm + mid arm). -->
  <g fill="white">
    <rect x="160" y="128" width="68" height="256" rx="10"/>
    <rect x="160" y="128" width="208" height="68" rx="10"/>
    <rect x="160" y="240" width="160" height="60" rx="10"/>
  </g>
</svg>
